name: Deploy

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        type: choice
        options:
          - development
          - staging
          - production

env:
  PHP_VERSION: '8.4'
  BUN_VERSION: 'latest'
  THEME_ROOT: 'web/themes/custom/books'

jobs:
  qa-gate:
    name: Verify CI Passed
    runs-on: ubuntu-latest
    steps:
      - name: Check CI workflow status
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "🔍 Checking CI status for commit ${{ github.sha }}..."

          # Get the CI workflow runs for this commit
          CI_STATUS=$(gh api \
            -H "Accept: application/vnd.github+json" \
            "/repos/${{ github.repository }}/actions/workflows/ci.yml/runs?head_sha=${{ github.sha }}&status=completed" \
            --jq '.workflow_runs[0].conclusion // "not_found"')

          echo "CI workflow status: $CI_STATUS"

          if [ "$CI_STATUS" = "success" ]; then
            echo "✅ CI workflow passed for this commit"
          elif [ "$CI_STATUS" = "not_found" ]; then
            echo "❌ No CI workflow run found for this commit"
            echo "Please ensure CI has run and passed before deploying."
            exit 1
          else
            echo "❌ CI workflow did not pass (status: $CI_STATUS)"
            echo "Please fix CI issues before deploying."
            exit 1
          fi

  build:
    name: Build Release
    runs-on: ubuntu-latest
    needs: qa-gate
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: dom, curl, libxml, mbstring, zip, pdo, mysql, pdo_mysql, gd
          coverage: none

      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install Composer dependencies (production)
        run: composer install --prefer-dist --no-progress --no-interaction --optimize-autoloader --no-dev --ignore-platform-reqs

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        working-directory: ${{ env.THEME_ROOT }}
        run: bun install --frozen-lockfile

      - name: Build theme
        working-directory: ${{ env.THEME_ROOT }}
        run: bun run build

      - name: Clean up node_modules
        run: rm -rf ${{ env.THEME_ROOT }}/node_modules

      - name: Create release archive
        run: |
          mkdir -p build/dist
          tar --exclude=".[^/]*" -czf build/dist/$(date +"%Y%m%d%H%M").tar.gz \
            composer.json \
            composer.lock \
            config \
            drush \
            scripts \
            vendor \
            web

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: release
          path: build/dist/*.tar.gz
          retention-days: 1

  deploy:
    name: Deploy to ${{ inputs.environment || 'production' }}
    runs-on: ubuntu-latest
    needs: build
    environment: ${{ inputs.environment || 'production' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download release artifact
        uses: actions/download-artifact@v4
        with:
          name: release
          path: build/dist

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          echo "${{ secrets.SSH_KNOWN_HOSTS }}" > ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Notify Slack - Deployment Started
        if: ${{ vars.SLACK_NOTIFICATIONS == 'true' }}
        run: |
          curl -X POST -H "Content-type: application/json" --data '{
            "attachments": [
              {
                "color": "#0000ff",
                "blocks": [
                  {
                    "type": "section",
                    "text": {
                      "type": "mrkdwn",
                      "text": "*Deployment pipeline started* \n\n *Project:* ${{ github.repository }} \n *Environment:* ${{ inputs.environment || 'production' }} \n *Run ID:* <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|${{ github.run_id }}> \n *Triggered by:* ${{ github.actor }}"
                    }
                  }
                ]
              }
            ]
          }' "${{ secrets.SLACK_WEBHOOK_URL }}"

      - name: Deploy
        env:
          SSH_HOST: ${{ vars.SSH_HOST }}
          SSH_PORT: ${{ vars.SSH_PORT }}
          SSH_OPTIONS: ${{ vars.SSH_OPTIONS }}
          PROJECT_REMOTE_DIR: ${{ vars.PROJECT_REMOTE_DIR }}
          PROJECT_REMOTE_WEBROOT: ${{ vars.PROJECT_REMOTE_WEBROOT }}
        run: ./scripts/github/deploy.sh

      - name: Notify Slack - Deployment Succeeded
        if: ${{ success() && vars.SLACK_NOTIFICATIONS == 'true' }}
        run: |
          curl -X POST -H "Content-type: application/json" --data '{
            "attachments": [
              {
                "color": "#00c100",
                "blocks": [
                  {
                    "type": "section",
                    "text": {
                      "type": "mrkdwn",
                      "text": "*Deployment pipeline succeeded* \n\n *Project:* ${{ github.repository }} \n *Environment:* ${{ inputs.environment || 'production' }} \n *Run ID:* <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|${{ github.run_id }}> \n *Triggered by:* ${{ github.actor }}"
                    }
                  }
                ]
              }
            ]
          }' "${{ secrets.SLACK_WEBHOOK_URL }}"

      - name: Notify Slack - Deployment Failed
        if: ${{ failure() && vars.SLACK_NOTIFICATIONS == 'true' }}
        run: |
          curl -X POST -H "Content-type: application/json" --data '{
            "attachments": [
              {
                "color": "#ff0909",
                "blocks": [
                  {
                    "type": "section",
                    "text": {
                      "type": "mrkdwn",
                      "text": "*Deployment pipeline failed* \n\n *Project:* ${{ github.repository }} \n *Environment:* ${{ inputs.environment || 'production' }} \n *Run ID:* <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|${{ github.run_id }}> \n *Triggered by:* ${{ github.actor }}"
                    }
                  }
                ]
              }
            ]
          }' "${{ secrets.SLACK_WEBHOOK_URL }}"
