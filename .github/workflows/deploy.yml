name: Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        type: choice
        options:
          - development
          - staging
          - production
  push:
    tags:
      - 'v*'

env:
  PHP_VERSION: '8.4'
  THEME_ROOT: 'web/themes/custom/books'

jobs:
  composer:
    name: Composer Install
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: dom, curl, libxml, mbstring, zip, pdo, mysql, pdo_mysql, gd
          coverage: none

      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Validate composer.json
        run: composer validate --no-check-all --ansi

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress --no-interaction --optimize-autoloader --ignore-platform-reqs

      - name: Cache installed vendor
        uses: actions/cache/save@v4
        with:
          path: |
            vendor
            web/autoload.php
            web/index.php
            web/.ht.router.php
            web/core
            web/modules/contrib
            web/profiles/contrib
            web/themes/contrib
            web/libraries
            drush/Commands
          key: vendor-installed-${{ github.run_id }}

  theme-build:
    name: Theme Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        working-directory: ${{ env.THEME_ROOT }}
        run: bun install --frozen-lockfile

      - name: Build theme
        working-directory: ${{ env.THEME_ROOT }}
        run: bun run build

      - name: Cache built theme
        uses: actions/cache/save@v4
        with:
          path: ${{ env.THEME_ROOT }}/build
          key: theme-built-${{ github.run_id }}

  phpcs:
    name: PHPCS
    runs-on: ubuntu-latest
    needs: composer
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: dom, curl, libxml, mbstring, zip, pdo, mysql, pdo_mysql, gd
          coverage: none

      - name: Restore installed vendor
        uses: actions/cache/restore@v4
        with:
          path: |
            vendor
            web/autoload.php
            web/index.php
            web/.ht.router.php
            web/core
            web/modules/contrib
            web/profiles/contrib
            web/themes/contrib
            web/libraries
            drush/Commands
          key: vendor-installed-${{ github.run_id }}

      - name: Run PHPCS
        run: |
          php vendor/bin/phpcs -p --colors \
            --standard="Drupal,DrupalPractice" \
            --extensions="php,inc,module,install,test,profile,theme" \
            --ignore='web/core,**/node_modules/**' \
            web/**/custom

  phpstan:
    name: PHPStan
    runs-on: ubuntu-latest
    needs: composer
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: dom, curl, libxml, mbstring, zip, pdo, mysql, pdo_mysql, gd
          coverage: none

      - name: Restore installed vendor
        uses: actions/cache/restore@v4
        with:
          path: |
            vendor
            web/autoload.php
            web/index.php
            web/.ht.router.php
            web/core
            web/modules/contrib
            web/profiles/contrib
            web/themes/contrib
            web/libraries
            drush/Commands
          key: vendor-installed-${{ github.run_id }}

      - name: Run PHPStan
        run: |
          php vendor/bin/phpstan analyze web/**/custom \
            --no-progress \
            --configuration phpstan.neon \
            --error-format table \
            --memory-limit 4G

  phpunit-unit:
    name: PHPUnit (Unit)
    runs-on: ubuntu-latest
    needs: composer
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: dom, curl, libxml, mbstring, zip, pdo, mysql, pdo_mysql, gd
          coverage: none

      - name: Restore installed vendor
        uses: actions/cache/restore@v4
        with:
          path: |
            vendor
            web/autoload.php
            web/index.php
            web/.ht.router.php
            web/core
            web/modules/contrib
            web/profiles/contrib
            web/themes/contrib
            web/libraries
            drush/Commands
          key: vendor-installed-${{ github.run_id }}

      - name: Run PHPUnit unit tests
        run: php vendor/bin/phpunit --testsuite unit --no-progress --colors=always

  phpunit-kernel:
    name: PHPUnit (Kernel)
    runs-on: ubuntu-latest
    needs: composer
    services:
      mysql:
        image: mariadb:10.11
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: drupal
        ports:
          - 3306:3306
        options: --health-cmd="mariadb-admin ping" --health-interval=10s --health-timeout=5s --health-retries=3
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: dom, curl, libxml, mbstring, zip, pdo, mysql, pdo_mysql, gd
          coverage: none

      - name: Restore installed vendor
        uses: actions/cache/restore@v4
        with:
          path: |
            vendor
            web/autoload.php
            web/index.php
            web/.ht.router.php
            web/core
            web/modules/contrib
            web/profiles/contrib
            web/themes/contrib
            web/libraries
            drush/Commands
          key: vendor-installed-${{ github.run_id }}

      - name: Run PHPUnit kernel tests
        env:
          SIMPLETEST_DB: mysql://root:root@127.0.0.1:3306/drupal
          SIMPLETEST_BASE_URL: http://localhost
        run: php vendor/bin/phpunit --testsuite kernel --no-progress --colors=always

  phpunit-functional:
    name: PHPUnit (Functional)
    runs-on: ubuntu-latest
    needs: composer
    services:
      mysql:
        image: mariadb:10.11
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: drupal
        ports:
          - 3306:3306
        options: --health-cmd="mariadb-admin ping" --health-interval=10s --health-timeout=5s --health-retries=3
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: dom, curl, libxml, mbstring, zip, pdo, mysql, pdo_mysql, gd
          coverage: none

      - name: Restore installed vendor
        uses: actions/cache/restore@v4
        with:
          path: |
            vendor
            web/autoload.php
            web/index.php
            web/.ht.router.php
            web/core
            web/modules/contrib
            web/profiles/contrib
            web/themes/contrib
            web/libraries
            drush/Commands
          key: vendor-installed-${{ github.run_id }}

      - name: Prepare test environment
        run: |
          mkdir -p web/sites/simpletest/browser_output
          mkdir -p web/sites/default/files
          chmod -R 777 web/sites/simpletest
          chmod -R 777 web/sites/default

      - name: Start PHP built-in server
        env:
          DRUPAL_DB_NAME: drupal
          DRUPAL_DB_USER: root
          DRUPAL_DB_PASS: root
          DRUPAL_DB_HOST: 127.0.0.1
          DRUPAL_DB_PORT: '3306'
          DRUPAL_HASH_SALT: test_hash_salt
          DRUPAL_BASE_URL: localhost
        run: |
          cd web && php -S localhost:8080 .ht.router.php &
          sleep 2

      - name: Run PHPUnit functional tests
        env:
          SIMPLETEST_DB: mysql://root:root@127.0.0.1:3306/drupal
          SIMPLETEST_BASE_URL: http://localhost:8080
          BROWSERTEST_OUTPUT_DIRECTORY: web/sites/simpletest/browser_output
          DRUPAL_DB_NAME: drupal
          DRUPAL_DB_USER: root
          DRUPAL_DB_PASS: root
          DRUPAL_DB_HOST: 127.0.0.1
          DRUPAL_DB_PORT: '3306'
          DRUPAL_HASH_SALT: test_hash_salt
          DRUPAL_BASE_URL: localhost
        run: php vendor/bin/phpunit --testsuite functional --no-progress --colors=always

  build:
    name: Build Release
    runs-on: ubuntu-latest
    needs: [theme-build, phpcs, phpstan, phpunit-unit, phpunit-kernel, phpunit-functional]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: dom, curl, libxml, mbstring, zip, pdo, mysql, pdo_mysql, gd
          coverage: none

      - name: Restore installed vendor
        uses: actions/cache/restore@v4
        with:
          path: |
            vendor
            web/autoload.php
            web/index.php
            web/.ht.router.php
            web/core
            web/modules/contrib
            web/profiles/contrib
            web/themes/contrib
            web/libraries
            drush/Commands
          key: vendor-installed-${{ github.run_id }}

      - name: Strip dev dependencies
        run: composer install --prefer-dist --no-progress --no-interaction --optimize-autoloader --no-dev --ignore-platform-reqs

      - name: Restore built theme
        uses: actions/cache/restore@v4
        with:
          path: ${{ env.THEME_ROOT }}/build
          key: theme-built-${{ github.run_id }}

      - name: Create release archive
        run: |
          mkdir -p build/dist
          tar --exclude=".[^/]*" -czf build/dist/$(date +"%Y%m%d%H%M").tar.gz \
            composer.json \
            composer.lock \
            config \
            drush \
            scripts \
            vendor \
            web

      - name: Cache release archive
        uses: actions/cache/save@v4
        with:
          path: build/dist
          key: release-${{ github.run_id }}

  deploy:
    name: Deploy to ${{ inputs.environment || 'production' }}
    runs-on: ubuntu-latest
    needs: build
    environment: ${{ inputs.environment || 'production' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Restore release archive
        uses: actions/cache/restore@v4
        with:
          path: build/dist
          key: release-${{ github.run_id }}

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          echo "${{ secrets.SSH_KNOWN_HOSTS }}" > ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Notify Slack - Deployment Started
        if: ${{ vars.SLACK_NOTIFICATIONS == 'true' }}
        run: |
          curl -X POST -H "Content-type: application/json" --data '{
            "attachments": [
              {
                "color": "#0000ff",
                "blocks": [
                  {
                    "type": "section",
                    "text": {
                      "type": "mrkdwn",
                      "text": "*Deployment pipeline started* \n\n *Project:* ${{ github.repository }} \n *Environment:* ${{ inputs.environment || 'production' }} \n *Run ID:* <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|${{ github.run_id }}> \n *Triggered by:* ${{ github.actor }}"
                    }
                  }
                ]
              }
            ]
          }' "${{ secrets.SLACK_WEBHOOK_URL }}"

      - name: Deploy
        env:
          SSH_HOST: ${{ vars.SSH_HOST }}
          SSH_PORT: ${{ vars.SSH_PORT }}
          SSH_OPTIONS: ${{ vars.SSH_OPTIONS }}
          PROJECT_REMOTE_DIR: ${{ vars.PROJECT_REMOTE_DIR }}
          PROJECT_REMOTE_WEBROOT: ${{ vars.PROJECT_REMOTE_WEBROOT }}
        run: ./scripts/github/deploy.sh

      - name: Notify Slack - Deployment Succeeded
        if: ${{ success() && vars.SLACK_NOTIFICATIONS == 'true' }}
        run: |
          curl -X POST -H "Content-type: application/json" --data '{
            "attachments": [
              {
                "color": "#00c100",
                "blocks": [
                  {
                    "type": "section",
                    "text": {
                      "type": "mrkdwn",
                      "text": "*Deployment pipeline succeeded* \n\n *Project:* ${{ github.repository }} \n *Environment:* ${{ inputs.environment || 'production' }} \n *Run ID:* <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|${{ github.run_id }}> \n *Triggered by:* ${{ github.actor }}"
                    }
                  }
                ]
              }
            ]
          }' "${{ secrets.SLACK_WEBHOOK_URL }}"

      - name: Notify Slack - Deployment Failed
        if: ${{ failure() && vars.SLACK_NOTIFICATIONS == 'true' }}
        run: |
          curl -X POST -H "Content-type: application/json" --data '{
            "attachments": [
              {
                "color": "#ff0909",
                "blocks": [
                  {
                    "type": "section",
                    "text": {
                      "type": "mrkdwn",
                      "text": "*Deployment pipeline failed* \n\n *Project:* ${{ github.repository }} \n *Environment:* ${{ inputs.environment || 'production' }} \n *Run ID:* <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|${{ github.run_id }}> \n *Triggered by:* ${{ github.actor }}"
                    }
                  }
                ]
              }
            ]
          }' "${{ secrets.SLACK_WEBHOOK_URL }}"
